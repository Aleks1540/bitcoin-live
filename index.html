<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Bitcoin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at top left, #1f2937, #020617 55%);
  color: white;
  font-family: Arial, sans-serif;
}

.dashboard {
  height: 100vh;
  padding: 60px 80px;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 35px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.kicker {
  font-size: 28px;
  letter-spacing: 5px;
  opacity: .6;
}

h1 {
  font-size: 82px;
  margin: 12px 0 0;
}

.live {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-top: 18px;
  font-size: 24px;
  opacity: .8;
}

.dot {
  width: 14px;
  height: 14px;
  background: #22c55e;
  border-radius: 50%;
  box-shadow: 0 0 24px #22c55e;
}

.priceArea {
  text-align: right;
}

#price {
  font-size: 130px;
  font-weight: 900;
  line-height: .95;
}

#movement {
  font-size: 34px;
  margin-top: 16px;
  padding: 14px 24px;
  border-radius: 999px;
  display: inline-block;
  background: rgba(255,255,255,.08);
}

.up { color: #22c55e; }
.down { color: #ef4444; }

.grid {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 30px;
  min-height: 0;
}

.chartCard, .sideCard {
  background: rgba(255,255,255,.055);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 34px;
  padding: 34px;
  box-shadow: 0 30px 90px rgba(0,0,0,.45);
}

canvas {
  width: 100% !important;
  height: 100% !important;
}

.sideCard {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.stat {
  border-bottom: 1px solid rgba(255,255,255,.12);
  padding-bottom: 25px;
}

.stat:last-child {
  border-bottom: none;
}

.label {
  font-size: 22px;
  opacity: .55;
  margin-bottom: 10px;
}

.value {
  font-size: 42px;
  font-weight: 800;
}

#updated {
  font-size: 22px;
  opacity: .55;
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="header">
    <div>
      <div class="kicker">LIVE CRYPTO MARKET</div>
      <h1>Bitcoin / USDT</h1>
      <div class="live"><span class="dot"></span> Live data streaming</div>
    </div>

    <div class="priceArea">
      <div id="price">Loading...</div>
      <div id="movement">Waiting for market data</div>
    </div>
  </div>

  <div class="grid">
    <div class="chartCard">
      <canvas id="chart"></canvas>
    </div>

    <div class="sideCard">
      <div class="stat">
        <div class="label">24H CHANGE</div>
        <div class="value" id="change">--</div>
      </div>

      <div class="stat">
        <div class="label">24H HIGH</div>
        <div class="value" id="high">--</div>
      </div>

      <div class="stat">
        <div class="label">24H LOW</div>
        <div class="value" id="low">--</div>
      </div>

      <div class="stat">
        <div class="label">LAST UPDATE</div>
        <div id="updated">--</div>
      </div>
    </div>
  </div>

</div>

<script>
const priceEl = document.getElementById("price");
const movementEl = document.getElementById("movement");
const changeEl = document.getElementById("change");
const highEl = document.getElementById("high");
const lowEl = document.getElementById("low");
const updatedEl = document.getElementById("updated");

let lastPrice = null;

const chart = new Chart(document.getElementById("chart"), {
  type: "line",
  data: {
    labels: [],
    datasets: [{
      data: [],
      borderWidth: 5,
      tension: 0.35,
      pointRadius: 0,
      fill: true,
      borderColor: "rgba(255,255,255,.95)",
      backgroundColor: "rgba(255,255,255,.07)"
    }]
  },
  options: {
    animation: false,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false }
    },
    scales: {
      x: {
        ticks: { color: "rgba(255,255,255,.55)", font: { size: 18 } },
        grid: { color: "rgba(255,255,255,.05)" }
      },
      y: {
        ticks: {
          color: "rgba(255,255,255,.55)",
          font: { size: 18 },
          callback: value => "$" + Number(value).toLocaleString()
        },
        grid: { color: "rgba(255,255,255,.08)" }
      }
    }
  }
});

function formatUSD(value) {
  return "$" + Number(value).toLocaleString("en-US", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function updateScreen(price, change, high, low) {
  const now = new Date().toLocaleTimeString();

  priceEl.innerText = formatUSD(price);

  if (lastPrice !== null) {
    const diff = price - lastPrice;

    if (diff > 0) {
      movementEl.innerText = "▲ +" + formatUSD(diff);
      movementEl.className = "up";
    } else if (diff < 0) {
      movementEl.innerText = "▼ " + formatUSD(diff);
      movementEl.className = "down";
    } else {
      movementEl.innerText = "No movement";
      movementEl.className = "";
    }
  }

  changeEl.innerText = (change >= 0 ? "+" : "") + Number(change).toFixed(2) + "%";
  changeEl.className = "value " + (change >= 0 ? "up" : "down");

  highEl.innerText = formatUSD(high);
  lowEl.innerText = formatUSD(low);
  updatedEl.innerText = now;

  chart.data.labels.push(now);
  chart.data.datasets[0].data.push(price);

  if (chart.data.labels.length > 80) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
  lastPrice = price;
}

const socket = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@ticker");

socket.onmessage = function(event) {
  const data = JSON.parse(event.data);

  const price = Number(data.c);
  const change = Number(data.P);
  const high = Number(data.h);
  const low = Number(data.l);

  updateScreen(price, change, high, low);
};

socket.onerror = function() {
  priceEl.innerText = "Live data unavailable";
};

socket.onclose = function() {
  movementEl.innerText = "Connection closed - refresh page";
};
</script>

</body>
</html>
