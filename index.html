<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Bitcoin 9:16</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at top, #1f2937, #020617 60%);
  color: white;
  font-family: Arial, sans-serif;
}

.screen {
  width: 100vw;
  height: 100vh;
  aspect-ratio: 9 / 16;
  padding: 70px 48px;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  gap: 34px;
}

.kicker {
  font-size: 24px;
  letter-spacing: 4px;
  opacity: .65;
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 74px;
  line-height: .95;
  text-align: center;
}

.live {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  font-size: 24px;
  opacity: .85;
}

.dot {
  width: 14px;
  height: 14px;
  background: #22c55e;
  border-radius: 50%;
  box-shadow: 0 0 24px #22c55e;
}

.priceBlock {
  text-align: center;
}

#price {
  font-size: 96px;
  font-weight: 900;
  line-height: 1;
}

#movement {
  margin-top: 18px;
  font-size: 32px;
  font-weight: 700;
}

.up { color: #22c55e; }
.down { color: #ef4444; }

.chartCard {
  min-height: 0;
  background: rgba(255,255,255,.055);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 34px;
  padding: 26px;
  box-shadow: 0 30px 90px rgba(0,0,0,.45);
}

canvas {
  width: 100% !important;
  height: 100% !important;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.stat {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 26px;
  padding: 22px;
}

.label {
  font-size: 18px;
  opacity: .55;
  margin-bottom: 8px;
}

.value {
  font-size: 30px;
  font-weight: 800;
}

.updated {
  grid-column: 1 / 3;
  text-align: center;
  font-size: 20px;
  opacity: .55;
}
</style>
</head>

<body>

<div class="screen">
  <div>
    <div class="kicker">LIVE CRYPTO MARKET</div>
    <h1>Bitcoin<br>/ USDT</h1>
    <div class="live"><span class="dot"></span> Live data streaming</div>
  </div>

  <div class="priceBlock">
    <div id="price">Loading...</div>
    <div id="movement">Waiting for market data</div>
  </div>

  <div class="chartCard">
    <canvas id="chart"></canvas>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="label">24H CHANGE</div>
      <div class="value" id="change">--</div>
    </div>

    <div class="stat">
      <div class="label">24H HIGH</div>
      <div class="value" id="high">--</div>
    </div>

    <div class="stat">
      <div class="label">24H LOW</div>
      <div class="value" id="low">--</div>
    </div>

    <div class="stat">
      <div class="label">PAIR</div>
      <div class="value">BTC/USDT</div>
    </div>

    <div class="updated" id="updated">Last update: --</div>
  </div>
</div>

<script>
const priceEl = document.getElementById("price");
const movementEl = document.getElementById("movement");
const changeEl = document.getElementById("change");
const highEl = document.getElementById("high");
const lowEl = document.getElementById("low");
const updatedEl = document.getElementById("updated");

let lastPrice = null;

const chart = new Chart(document.getElementById("chart"), {
  type: "line",
  data: {
    labels: [],
    datasets: [{
      data: [],
      borderWidth: 5,
      tension: 0.35,
      pointRadius: 0,
      fill: true,
      borderColor: "rgba(255,255,255,.95)",
      backgroundColor: "rgba(255,255,255,.07)"
    }]
  },
  options: {
    animation: false,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: {
        ticks: { color: "rgba(255,255,255,.5)", font: { size: 14 }, maxTicksLimit: 4 },
        grid: { color: "rgba(255,255,255,.05)" }
      },
      y: {
        ticks: {
          color: "rgba(255,255,255,.5)",
          font: { size: 14 },
          maxTicksLimit: 6,
          callback: value => "$" + Number(value).toLocaleString()
        },
        grid: { color: "rgba(255,255,255,.08)" }
      }
    }
  }
});

function formatUSD(value) {
  return "$" + Number(value).toLocaleString("en-US", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function updateScreen(price, change, high, low) {
  const now = new Date().toLocaleTimeString();

  priceEl.innerText = formatUSD(price);

  if (lastPrice !== null) {
    const diff = price - lastPrice;

    if (diff > 0) {
      movementEl.innerText = "▲ +" + formatUSD(diff);
      movementEl.className = "up";
    } else if (diff < 0) {
      movementEl.innerText = "▼ " + formatUSD(diff);
      movementEl.className = "down";
    } else {
      movementEl.innerText = "No movement";
      movementEl.className = "";
    }
  }

  changeEl.innerText = (change >= 0 ? "+" : "") + Number(change).toFixed(2) + "%";
  changeEl.className = "value " + (change >= 0 ? "up" : "down");

  highEl.innerText = formatUSD(high);
  lowEl.innerText = formatUSD(low);
  updatedEl.innerText = "Last update: " + now;

  chart.data.labels.push(now);
  chart.data.datasets[0].data.push(price);

  if (chart.data.labels.length > 60) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
  lastPrice = price;
}

const socket = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@ticker");

socket.onmessage = function(event) {
  const data = JSON.parse(event.data);
  updateScreen(Number(data.c), Number(data.P), Number(data.h), Number(data.l));
};

socket.onerror = function() {
  priceEl.innerText = "Live data unavailable";
};

socket.onclose = function() {
  movementEl.innerText = "Connection closed - refresh page";
};
</script>

</body>
</html>
