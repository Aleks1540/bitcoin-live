<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bitcoin Live 9:16</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  background: white;
  color: black;
  font-family: 'Oswald', sans-serif;
  overflow: hidden;
}

/* 9:16 layout */
.container {
  width: 100vw;
  height: 100vh;
  padding: 60px 50px;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  gap: 40px;
}

/* Header */
.header {
  text-align: center;
}

.kicker {
  font-size: 22px;
  letter-spacing: 4px;
  color: #999;
}

.title {
  font-size: 80px;
  margin: 10px 0;
}

.live {
  font-size: 22px;
  color: #22c55e;
}

/* Price */
.price {
  text-align: center;
}

#price {
  font-size: 110px;
  font-weight: 700;
}

#movement {
  font-size: 34px;
  margin-top: 10px;
}

.up { color: #22c55e; }
.down { color: #ef4444; }

/* Chart */
.chartBox {
  background: #f5f5f5;
  border-radius: 30px;
  padding: 20px;
}

canvas {
  width: 100% !important;
  height: 100% !important;
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.stat {
  background: #f0f0f0;
  padding: 20px;
  border-radius: 20px;
}

.label {
  font-size: 18px;
  color: #777;
}

.value {
  font-size: 34px;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="kicker">LIVE MARKET</div>
    <div class="title">BITCOIN</div>
    <div class="live">● LIVE DATA</div>
  </div>

  <div class="price">
    <div id="price">$--,---</div>
    <div id="movement">Connecting...</div>
  </div>

  <div class="chartBox">
    <canvas id="chart"></canvas>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="label">24H CHANGE</div>
      <div id="change" class="value">--</div>
    </div>

    <div class="stat">
      <div class="label">HIGH</div>
      <div id="high" class="value">--</div>
    </div>

    <div class="stat">
      <div class="label">LOW</div>
      <div id="low" class="value">--</div>
    </div>

    <div class="stat">
      <div class="label">UPDATED</div>
      <div id="updated" class="value">--</div>
    </div>
  </div>

</div>

<script>
const priceEl = document.getElementById("price");
const movementEl = document.getElementById("movement");
const changeEl = document.getElementById("change");
const highEl = document.getElementById("high");
const lowEl = document.getElementById("low");
const updatedEl = document.getElementById("updated");

let lastPrice = null;

/* Chart */
const chart = new Chart(document.getElementById("chart"), {
  type: "line",
  data: {
    labels: [],
    datasets: [{
      data: [],
      borderWidth: 4,
      tension: 0.3,
      pointRadius: 0,
      borderColor: "#22c55e",
      backgroundColor: "rgba(34,197,94,0.1)",
      fill: true
    }]
  },
  options: {
    animation: false,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { display: false },
      y: {
        ticks: {
          callback: val => "$" + val.toLocaleString()
        }
      }
    }
  }
});

function formatUSD(v) {
  return "$" + Number(v).toLocaleString("en-US", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function updateScreen(price, change, high, low) {
  const now = new Date().toLocaleTimeString();

  priceEl.innerText = formatUSD(price);

  if (lastPrice !== null) {
    let diff = price - lastPrice;

    if (diff > 0) {
      movementEl.innerText = "▲ +" + formatUSD(diff);
      movementEl.className = "up";
    } else {
      movementEl.innerText = "▼ " + formatUSD(diff);
      movementEl.className = "down";
    }
  }

  changeEl.innerText = change.toFixed(2) + "%";
  changeEl.className = "value " + (change >= 0 ? "up" : "down");

  highEl.innerText = formatUSD(high);
  lowEl.innerText = formatUSD(low);
  updatedEl.innerText = now;

  chart.data.labels.push(now);
  chart.data.datasets[0].data.push(price);

  if (chart.data.labels.length > 50) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
  lastPrice = price;
}

/* Live feed */
const socket = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@ticker");

socket.onmessage = (e) => {
  const d = JSON.parse(e.data);

  updateScreen(
    Number(d.c),
    Number(d.P),
    Number(d.h),
    Number(d.l)
  );
};
</script>

</body>
</html>
